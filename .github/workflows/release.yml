name: Create Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Get version
        id: get_version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Create zip
        run: zip -r "${{ steps.get_version.outputs.VERSION }}.zip" . -x ".git/*" ".github/*"

      - name: Extract release notes from version.js
        id: extract_notes
        run: |
          node -e "
            const fs = require('fs');
            const content = fs.readFileSync('version.js', 'utf8');
            const versionMatch = content.match(/export const CURRENT_VERSION = ['\"]([^'\"]+)['\"]/);
            if (!versionMatch) process.exit(1);
            const currentVersion = versionMatch[1];
            const logsMatch = content.match(/export const versionLogs = (\{[\s\S]*?\n\});/);
            if (!logsMatch) process.exit(1);
            const logs = eval('(' + logsMatch[1] + ')');
            const notes = logs[currentVersion];
            let output = '';
            if (Array.isArray(notes)) output = notes.join('\n');
            else if (typeof notes === 'string') output = notes;
            else output = '';
            require('fs').appendFileSync(process.env.GITHUB_OUTPUT, 'notes<<EOF\n' + output + '\nEOF\n');
          "

      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ steps.get_version.outputs.VERSION }}.zip
          body: ${{ steps.extract_notes.outputs.notes }}
          generate_release_notes: ${{ steps.extract_notes.outputs.notes == '' }}